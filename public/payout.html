<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payout - Mesxent Ad-Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0B132B; color: #FFFFFF; }</style>
</head>
<body class="p-6">
    <nav class="flex justify-around mb-8 p-4 bg-slate-800 rounded">
        <a href="index.html" class="text-emerald-400 font-bold">Overview</a>
        <a href="campaign.html" class="text-white font-bold">Campaigns</a>
        <a href="payout.html" class="text-white font-bold border-b border-white">Payout</a>
    </nav>

    <div class="card-bg p-6 rounded-xl border border-slate-700">
        <h2 class="text-xl font-bold text-amber-400 mb-4">Payout Disbursement</h2>
        <input type="number" id="amount" placeholder="Amount (NGN)" class="w-full p-3 bg-slate-900 mb-4 border border-slate-700 rounded text-white">
        <button id="payoutBtn" class="w-full bg-amber-600 hover:bg-amber-700 p-4 rounded font-bold transition">
            DISBURSE SETTLEMENT
        </button>
    </div>

    <script>
        document.getElementById('payoutBtn').addEventListener('click', async () => {
            const amount = document.getElementById('amount').value;
            alert("Processing Payout of ₦" + amount);
            // Add your payout API call here
        });
    </script>
</body>
</html>
