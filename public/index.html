<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesxent Ad-Bot OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0B132B; color: #FFFFFF; font-family: sans-serif; }
        .card-bg { background-color: #111A36; border: 1px solid #1E294B; }
        .page-section { display: none; }
        .page-section.active { display: block; }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 border-b border-slate-800 bg-[#0B132B] p-4 flex justify-between items-center">
        <h1 class="text-emerald-400 font-black text-sm uppercase">Mesxent Ad-Bot OS</h1>
        <div class="flex gap-4">
            <button onclick="goTo('pageHome')" class="text-[10px] text-slate-400 font-bold uppercase">Home</button>
            <button onclick="goTo('pageChairmanAuth')" class="text-[10px] text-rose-500 font-bold uppercase">🛡️ Admin</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-6" id="app">
        
        <section id="pageHome" class="page-section active">
            <h1 class="text-3xl font-black mb-4 text-emerald-500">Agro-Manufacturing Ad-Bot</h1>
            <div class="space-y-3">
                <button onclick="goTo('pageSignup')" class="w-full bg-emerald-600 py-3 rounded font-bold uppercase text-sm">Partner Registration</button>
                <button onclick="goTo('pageLogin')" class="w-full bg-slate-800 py-3 rounded font-bold uppercase text-sm">Partner Login</button>
                <button onclick="goTo('pageInvestor')" class="w-full border border-slate-700 py-3 rounded font-bold uppercase text-sm">Request Investor Pitch</button>
            </div>
        </section>

        <section id="pageSignup" class="page-section card-bg p-6 rounded-xl">
            <h2 class="text-emerald-400 font-bold mb-4">Registration</h2>
            <form onsubmit="event.preventDefault(); alert('Success'); goTo('pageHome')" class="space-y-3">
                <input required type="text" placeholder="Full Name" class="w-full p-2 bg-[#080F21] border border-slate-700 rounded text-sm text-white">
                <button type="submit" class="w-full bg-emerald-600 py-2 rounded font-bold">ACTIVATE</button>
            </form>
        </section>

        <section id="pageLogin" class="page-section card-bg p-6 rounded-xl">
            <h2 class="text-emerald-400 font-bold mb-4">Login</h2>
            <button onclick="goTo('pagePartnerDash'); syncTelemetry(false)" class="w-full bg-emerald-600 py-2 rounded font-bold">ACCESS DASHBOARD</button>
        </section>

        <section id="pagePartnerDash" class="page-section card-bg p-6 rounded-xl">
            <h2 class="text-emerald-400 font-bold mb-4">Partner Dashboard</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="card-bg p-4 rounded"><p class="text-[9px] uppercase text-slate-500">Rev</p><p id="uRev" class="font-bold text-emerald-400">Syncing...</p></div>
                <div class="card-bg p-4 rounded"><p class="text-[9px] uppercase text-slate-500">Loops</p><p id="uLoops" class="font-bold text-blue-400">Syncing...</p></div>
            </div>
        </section>

        <section id="pageInvestor" class="page-section card-bg p-6 rounded-xl">
            <h2 class="text-amber-400 font-bold mb-4">Investor Pitch</h2>
            <button onclick="goTo('pageHome'); alert('Request Sent')" class="w-full bg-amber-600 py-2 rounded font-bold">REQUEST PITCH</button>
        </section>

        <section id="pageChairmanAuth" class="page-section card-bg p-6 rounded-xl border border-rose-900">
            <h2 class="text-rose-500 font-bold mb-4">Admin Access</h2>
            <input type="password" id="mKey" placeholder="Enter Key" class="w-full p-2 mb-4 bg-[#080F21] border border-slate-700 rounded text-sm text-white">
            <button onclick="authAdmin()" class="w-full bg-rose-700 py-2 rounded font-bold">INITIALIZE</button>
        </section>

        <section id="pageChairmanDash" class="page-section">
            <h2 class="text-rose-500 font-bold mb-6">Global Statistics</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="card-bg p-4 rounded text-center"><p class="text-[9px] uppercase text-slate-500">Revenue</p><p id="gRev" class="font-bold text-emerald-400">Syncing...</p></div>
                <div class="card-bg p-4 rounded text-center"><p class="text-[9px] uppercase text-slate-500">Loops</p><p id="gLoops" class="font-bold text-blue-400">Syncing...</p></div>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="goTo('pageCamps')" class="bg-blue-600 py-3 rounded text-center font-bold text-sm uppercase">Campaigns</button>
                <button onclick="goTo('pagePayout')" class="bg-amber-600 py-3 rounded text-center font-bold text-sm uppercase">Payouts</button>
                <button onclick="goTo('pageAsset')" class="bg-rose-600 py-3 rounded text-center font-bold text-sm uppercase">Assets</button>
            </div>
        </section>
        
        <section id="pageCamps" class="page-section card-bg p-6 rounded-xl"><h2 class="text-blue-400 font-bold">Campaigns</h2></section>
        <section id="pagePayout" class="page-section card-bg p-6 rounded-xl"><h2 class="text-amber-400 font-bold">Payouts</h2></section>
        <section id="pageAsset" class="page-section card-bg p-6 rounded-xl"><h2 class="text-rose-400 font-bold">Assets</h2></section>
    </main>

    <script>
        const sb = supabase.createClient('https://bffzgtloidanlqizalty.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZnpndGxvaWRhbmxxaXphbHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5MzI5NzUsImV4cCI6MjA4MjUwODk3NX0.mizFlkVfEgNPwaaJ2LG1TIPKjWSHmEbkFLedPL6HGsM');

        function goTo(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function syncTelemetry(isAdmin) {
            const { data, count } = await sb.from('adbot_activities').select('*', { count: 'exact' });
            if (data) {
                const r = data.reduce((s, i) => s + (i.revenue || 0), 0);
                if (isAdmin) {
                    document.getElementById('gRev').innerText = "₦" + r.toLocaleString();
                    document.getElementById('gLoops').innerText = (count || 0).toLocaleString();
                } else {
                    document.getElementById('uRev').innerText = "₦" + r.toLocaleString();
                    document.getElementById('uLoops').innerText = (count || 0).toLocaleString();
                }
            }
        }

        function authAdmin() {
            if(document.getElementById('mKey').value === "11270629836102") {
                goTo('pageChairmanDash');
                syncTelemetry(true);
            } else { alert("Unauthorized"); }
        }
    </script>
</body>
</html>
