<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesxent Venture Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B132B; color: #FFFFFF; font-family: sans-serif; }
        .card-bg { background-color: #111A36; border: 1px solid #1E294B; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <header class="w-full border-b border-slate-800 bg-[#0B132B] p-4">
        <div class="max-w-7xl mx-auto flex flex-wrap gap-4 items-center">
            <span class="text-emerald-400 font-bold">MESXENT VENTURE GLOBAL</span>
            <div class="flex gap-2">
                <a href="index.html" class="bg-slate-800 text-white text-xs px-3 py-1 rounded">Overview</a>
                <a href="campaign.html" class="bg-blue-600 text-white text-xs px-3 py-1 rounded">Campaigns</a>
                <a href="payout.html" class="bg-amber-600 text-white text-xs px-3 py-1 rounded">Payout</a>
                <a href="assets.html" class="bg-rose-600 text-white text-xs px-3 py-1 rounded">Assets</a>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-6">
        <div id="landingHero" class="text-center py-10">
            <h1 class="text-3xl font-black text-white">Next-Generation Agribusiness</h1>
            <button id="showSignup" class="mt-6 bg-emerald-600 px-6 py-2 rounded text-sm font-bold">GET STARTED</button>
        </div>

        <div id="partnerSignUpForm" class="card-bg p-6 rounded-xl hidden">
            <h2 class="text-emerald-400 font-bold">Create Partner Account</h2>
            <form action="https://formspree.io/f/xaqznnqe" method="POST" class="mt-4 space-y-4">
                <input type="text" name="name" placeholder="Full Name" required class="w-full p-2 bg-[#080F21] border border-slate-700 rounded text-sm">
                <input type="email" name="email" placeholder="Email" required class="w-full p-2 bg-[#080F21] border border-slate-700 rounded text-sm">
                <button type="submit" class="w-full bg-emerald-600 py-2 rounded text-sm font-bold">SUBMIT</button>
            </form>
        </div>
    </main>

    <script>
        // Simple, non-crashing toggle
        document.getElementById('showSignup').addEventListener('click', () => {
            document.getElementById('partnerSignUpForm').classList.remove('hidden');
            document.getElementById('landingHero').classList.add('hidden');
        });
    </script>
</body>
</html>
