<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesxent Venture Global OS | Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #060913; --panel: #0f1626; --accent: #10b981; --text: #e2e8f0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        .gate-bg { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-custom { background: var(--panel); border: 1px solid #1e293b; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .nav-tabs .nav-link { color: #94a3b8; font-weight: bold; border: none; cursor: pointer; padding: 15px 25px; }
        .nav-tabs .nav-link.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: transparent; }
        .d-none { display: none !important; }
        .text-green { color: var(--accent); }
    </style>
</head>
<body>

    <div id="authGate" class="gate-bg">
        <div class="card-custom w-100" style="max-width:450px">
            <h4 class="text-green text-center mb-4">CHAIRMAN COMMAND ACCESS</h4>
            <div id="loginSection">
                <input type="text" id="loginUser" class="form-control mb-2 bg-dark text-white border-0" placeholder="Username">
                <input type="password" id="loginPass" class="form-control mb-3 bg-dark text-white border-0" placeholder="Password">
                <button class="btn btn-success w-100 mb-2" onclick="processAuth()">INITIALIZE MASTER SESSION</button>
                <button class="btn btn-link text-muted w-100" onclick="toggleView('regSection')">Register New Node</button>
            </div>
            <div id="regSection" class="d-none">
                <input type="text" id="r_name" class="form-control mb-2" placeholder="Full Name">
                <input type="email" id="r_email" class="form-control mb-2" placeholder="Email">
                <input type="text" id="r_node_id" class="form-control mb-3" placeholder="Organization ID">
                <button class="btn btn-success w-100" onclick="registerNode()">SUBMIT APPLICATION</button>
                <button class="btn btn-link text-muted w-100" onclick="toggleView('loginSection')">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="appInterface" class="p-4 d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="text-green fw-bold">CHAIRMAN'S OFFICE</h4>
                <small>Core ID: 11270629836102</small>
            </div>
            <button class="btn btn-outline-danger" onclick="location.reload()">TERMINATE SESSION</button>
        </div>

        <ul class="nav nav-tabs mb-4">
            <li class="nav-item"><button class="nav-link active" onclick="switchTab('overview')">ECOSYSTEM OVERVIEW</button></li>
            <li class="nav-item"><button class="nav-link" onclick="switchTab('loader')">CAMPAIGN LOADER</button></li>
            <li class="nav-item"><button class="nav-link" onclick="switchTab('users')">USER DASHBOARDS</button></li>
        </ul>

        <div id="overviewTab" class="row g-3">
            <div class="col-md-4 card-custom"><small>ADS/SEC</small><h3 id="liveAds">0</h3></div>
            <div class="col-md-4 card-custom"><small>ACTIVE NODES</small><h3 id="liveNodes">0</h3></div>
            <div class="col-md-4 card-custom"><small>NAIRA VALUE</small><h3 id="liveNaira">₦0</h3></div>
        </div>

        <div id="loaderTab" class="card-custom d-none">
            <h5>Deploy Global Campaign</h5>
            <input type="text" id="cam_title" class="form-control mb-2" placeholder="Campaign Title">
            <textarea id="cam_desc" class="form-control mb-2" placeholder="Description"></textarea>
            <input type="url" id="cam_url" class="form-control mb-2" value="https://www.mesxentventureglobal.store">
            <input type="text" id="cam_ad_id" class="form-control mb-2" placeholder="Ad Unit ID">
            <button class="btn btn-success w-100" onclick="deployCampaign()">BROADCAST TO NETWORK</button>
        </div>

        <div id="usersTab" class="card-custom d-none">
            <h5>Registered Organization Entities</h5>
            <div id="userList" class="mt-3"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://bffzgtloidanlqizalty.supabase.co", "sb_publishable_laCBEwCIQ2cXnErxgZqVgg_OfvW48C7");

        function toggleView(v) {
            document.getElementById('loginSection').classList.add('d-none');
            document.getElementById('regSection').classList.add('d-none');
            document.getElementById(v).classList.remove('d-none');
        }

        function switchTab(t) {
            ['overview', 'loader', 'users'].forEach(tab => document.getElementById(tab + 'Tab').classList.add('d-none'));
            document.getElementById(t + 'Tab').classList.remove('d-none');
        }

        async function processAuth() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            // Strict ID/Password validation as per system requirement
            if(user === "Jeremy" && pass === "11270629836102") {
                document.getElementById('authGate').classList.add('d-none');
                document.getElementById('appInterface').classList.remove('d-none');
                setInterval(refreshStats, 3000); 
                refreshStats();
            } else { alert("ACCESS DENIED: IDENTITY VERIFICATION FAILED"); }
        }

        async function refreshStats() {
            // Live data polling: If database is empty, UI will reflect 0.
            const { count: ads } = await _supabase.from('traffic_logs').select('*', { count: 'exact', head: true });
            const { count: nodes } = await _supabase.from('customer_profiles').select('*', { count: 'exact', head: true });
            const adCount = ads || 0;
            document.getElementById('liveAds').innerText = adCount;
            document.getElementById('liveNodes').innerText = nodes || 0;
            document.getElementById('liveNaira').innerText = "₦" + (adCount * 1500).toLocaleString();
            
            const { data: users } = await _supabase.from('customer_profiles').select('full_name, org_id');
            if(users) {
                document.getElementById('userList').innerHTML = users.map(u => `<div class="p-2 border-bottom">${u.full_name} (${u.org_id})</div>`).join('');
            }
        }

        async function registerNode() {
            await _supabase.from('customer_profiles').insert([{ 
                full_name: document.getElementById('r_name').value,
                email: document.getElementById('r_email').value,
                org_id: document.getElementById('r_node_id').value
            }]);
            alert("Application Submitted");
        }

        async function deployCampaign() {
            await _supabase.from('marketing_campaigns').insert([{ 
                title: document.getElementById('cam_title').value,
                description: document.getElementById('cam_desc').value,
                url: document.getElementById('cam_url').value,
                ad_unit_id: document.getElementById('cam_ad_id').value 
            }]);
            alert("Campaign Broadcasted");
        }
    </script>
</body>
</html>
