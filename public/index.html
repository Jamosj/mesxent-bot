<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesxent Venture Global OS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #060913; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .hero-agri { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?auto=format&fit=crop&q=80&w=1000'); background-size: cover; height: 400px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .card-custom { background: #0f1626; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .nav-tabs .nav-link { color: #94a3b8; font-weight: bold; border: none; }
        .nav-tabs .nav-link.active { color: #10b981; border-bottom: 3px solid #10b981; background: transparent; }
        .d-none { display: none !important; }
        .text-green { color: #10b981; }
    </style>
</head>
<body>

    <!-- 1. PUBLIC LANDING PAGE -->
    <div id="landingGate">
        <div class="hero-agri">
            <div>
                <h1 class="display-3 fw-bold text-green">MESXENT AGRI-OS</h1>
                <p class="lead">Global Agribusiness Automation & Monetization Infrastructure</p>
                <button class="btn btn-success btn-lg mt-3" onclick="showSection('regGate')">Register New Node</button>
                <button class="btn btn-outline-light btn-lg mt-3" onclick="showSection('loginGate')">Chairman Login</button>
            </div>
        </div>
    </div>

    <!-- 2. AUTH & REGISTRATION GATES -->
    <div id="authContainer" class="p-4 d-none">
        <div id="loginGate" class="card-custom mx-auto" style="max-width:400px">
            <h4 class="text-green text-center mb-4">CHAIRMAN ACCESS</h4>
            <input type="text" id="loginUser" class="form-control mb-3 bg-dark text-white" placeholder="Username">
            <input type="password" id="loginPass" class="form-control mb-3 bg-dark text-white" placeholder="Password">
            <button class="btn btn-success w-100 fw-bold" onclick="processAuth()">ENTER COMMAND CENTER</button>
            <button class="btn btn-link text-muted w-100" onclick="showSection('landingGate')">Back to Landing</button>
        </div>

        <div id="regGate" class="card-custom mx-auto d-none" style="max-width:400px">
            <h4 class="text-green text-center mb-4">NODE REGISTRATION</h4>
            <input type="text" id="r_name" class="form-control mb-2" placeholder="Full Name">
            <input type="email" id="r_email" class="form-control mb-2" placeholder="Email">
            <button class="btn btn-success w-100" onclick="submitRegistration()">SUBMIT APPLICATION</button>
            <button class="btn btn-link text-muted w-100" onclick="showSection('landingGate')">Cancel</button>
        </div>
    </div>

    <!-- 3. MAIN CHAIRMAN DASHBOARD -->
    <div id="appInterface" class="p-3 d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="text-green fw-bold">CHAIRMAN'S OFFICE</h4>
            <button class="btn btn-sm btn-outline-danger" onclick="location.reload()">LOGOUT</button>
        </div>

        <ul class="nav nav-tabs mb-4">
            <li class="nav-item"><button class="nav-link active" onclick="tabSwitch('overview')">OVERVIEW</button></li>
            <li class="nav-item"><button class="nav-link" onclick="tabSwitch('loader')">CAMPAIGN LOADER</button></li>
        </ul>

        <!-- TELEMETRY OVERVIEW -->
        <div id="overviewTab">
            <div class="row g-3">
                <div class="col-md-4 card-custom text-center"><small>Ads/Sec (Live)</small><h2 id="liveAds" class="text-primary">0</h2></div>
                <div class="col-md-4 card-custom text-center"><small>Active Nodes</small><h2 id="liveNodes" class="text-green">0</h2></div>
                <div class="col-md-4 card-custom text-center"><small>Naira Value</small><h2 id="liveNaira" class="text-warning">₦0</h2></div>
            </div>
        </div>

        <!-- CAMPAIGN LOADER -->
        <div id="loaderTab" class="d-none card-custom">
            <h5>Deploy Campaign & Ad-Unit Architecture</h5>
            <form id="campaignForm">
                <input type="text" id="cam_title" class="form-control mb-2" placeholder="Campaign Title" required>
                <textarea id="cam_desc" class="form-control mb-2" placeholder="Campaign Description" rows="3"></textarea>
                <input type="url" id="cam_url" class="form-control mb-2" value="https://www.mesxentventureglobal.store">
                <input type="text" id="cam_ad_id" class="form-control mb-2" placeholder="Ad Unit ID / Placement Token">
                <select id="cam_media" class="form-select mb-3">
                    <option value="IMAGE">Image Content</option>
                    <option value="VIDEO">Video Content</option>
                </select>
                <button type="submit" class="btn btn-success w-100 fw-bold">BROADCAST CAMPAIGN</button>
            </form>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://bffzgtloidanlqizalty.supabase.co", "sb_publishable_laCBEwCIQ2cXnErxgZqVgg_OfvW48C7");

        function showSection(id) {
            document.querySelectorAll('#landingGate, #authContainer, #loginGate, #regGate').forEach(el => el.classList.add('d-none'));
            if(id === 'landingGate') document.getElementById('landingGate').classList.remove('d-none');
            else { document.getElementById('authContainer').classList.remove('d-none'); document.getElementById(id).classList.remove('d-none'); }
        }

        function tabSwitch(tab) {
            document.getElementById('overviewTab').classList.add('d-none');
            document.getElementById('loaderTab').classList.add('d-none');
            document.getElementById(tab + 'Tab').classList.remove('d-none');
        }

        async function processAuth() {
            if(document.getElementById('loginUser').value === "Jeremy") {
                document.getElementById('authContainer').classList.add('d-none');
                document.getElementById('appInterface').classList.remove('d-none');
                setInterval(fetchStats, 3000);
                fetchStats();
            }
        }

        async function fetchStats() {
            const { count: ads } = await _supabase.from('traffic_logs').select('*', { count: 'exact', head: true });
            const { count: nodes } = await _supabase.from('customer_profiles').select('*', { count: 'exact', head: true });
            document.getElementById('liveAds').innerText = ads || 0;
            document.getElementById('liveNodes').innerText = nodes || 0;
            document.getElementById('liveNaira').innerText = "₦" + ((ads || 0) * 1500).toLocaleString();
        }

        document.getElementById('campaignForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('cam_title').value,
                description: document.getElementById('cam_desc').value,
                ad_unit_id: document.getElementById('cam_ad_id').value
            };
            await _supabase.from('marketing_campaigns').insert([data]);
            alert("Broadcast successful: Campaign and Ad-Unit Architecture deployed.");
        });

        async function submitRegistration() {
            const data = { full_name: document.getElementById('r_name').value, email: document.getElementById('r_email').value };
            await _supabase.from('customer_profiles').insert([data]);
            alert("Registration successful.");
            showSection('landingGate');
        }
    </script>
</body>
</html>
