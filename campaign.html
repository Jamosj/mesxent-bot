<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campaign Loader - Mesxent Ad-Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0B132B; color: #FFFFFF; }</style>
</head>
<body class="p-6">
    <nav class="flex justify-around mb-8 p-4 bg-slate-800 rounded">
        <a href="index.html" class="text-emerald-400 font-bold">Overview</a>
        <a href="campaign.html" class="text-white font-bold border-b border-white">Campaigns</a>
        <a href="payout.html" class="text-white font-bold">Payout</a>
    </nav>

    <div class="card-bg p-6 rounded-xl border border-slate-700">
        <h2 class="text-xl font-bold text-emerald-400 mb-4">Campaign Loader Interface</h2>
        <button id="runCampaignBtn" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded font-bold transition">
            EXECUTE CAMPAIGN DEPLOYMENT
        </button>
    </div>

    <script>
        document.getElementById('runCampaignBtn').addEventListener('click', async () => {
            alert("Deploying Campaign...");
            const res = await fetch('/api/deploy', { method: 'POST' });
            const data = await res.json();
            alert("Response: " + data.status);
        });
    </script>
</body>
</html>
